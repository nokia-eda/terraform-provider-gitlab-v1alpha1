qualified:
  datasources:
    - oas_schema: IntentTargets
      get: /apps/gitlab.eda.nokia.com/v1alpha1/clustergitlabinstances/{name}/_targets
    - oas_schema: ResourceHistory
      get: /apps/gitlab.eda.nokia.com/v1alpha1/clustergitlabinstances/{name}/_revs
    - oas_schema: UIResult
      get: /apps/gitlab.eda.nokia.com/v1alpha1/_ui/{pathname}
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.ClusterGitlabInstance_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/clustergitlabinstances/_deleted
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.ClusterGitlabIssue_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/clustergitlabissues/_deleted
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.ClusterGitlabPipeline_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/clustergitlabpipelines/_deleted
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.GitlabInstance_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/namespaces/{namespace}/gitlabinstances/_deleted
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.GitlabIssue_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/namespaces/{namespace}/gitlabissues/_deleted
    - oas_schema: com.nokia.eda.gitlab.v1alpha1.GitlabPipeline_DeletedResources
      get: /apps/gitlab.eda.nokia.com/v1alpha1/namespaces/{namespace}/gitlabpipelines/_deleted
